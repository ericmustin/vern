name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run Vern review
        run: go run . review

      - name: Regenerate generated artifacts
        run: go run . generate --output workflows.yaml

      - name: Verify generated artifacts are current
        run: git diff --exit-code dashboards.ndjson agent-skill.md

      - name: Check whitespace
        run: git diff --check
