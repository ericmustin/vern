# esql-mappings.yaml — ES|QL query mappings for the Instrumentation Score spec.
#
# Each rule maps to an ES|QL query that returns the uniform shape:
#   rule_passed (bool), service.name (string), example (string),
#   extent (float, 0.0-1.0)
#
# Templates use Go text/template — variables are resolved by `vern generate`
# from vern.yaml before the query is embedded in the workflow.
#
# Field-path notes (for native OTel ingest into Elastic Serverless):
#   service.name           -> resource.attributes.service.name
#   service.instance.id    -> resource.attributes.service.instance.id
#   span kind              -> top-level `kind` (PascalCase, e.g. "Internal", "Client";
#                              SPAN_KIND_* form also matched for forward compat)
#   parent span id         -> top-level `parent_span_id`
#   trace id               -> top-level `trace_id`
#   span name              -> top-level `name`
#   duration               -> top-level `duration` (nanoseconds)
#   k8s pod uid            -> resource.attributes.k8s.pod.uid
#
# All BY-clause grouping fields are RENAMEd to `service.name` so the result
# index has a consistent schema across rules.

backend: esql
version: "0.2.0"
spec_version: "0.1"

rules:

  # ─── Resource Rules ───────────────────────────────────────────

  - spec_rule_id: "RES-005"
    enabled: true
    description: "service.name is present"
    impact: "Critical"
    target: "Resource"
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
      | EVAL missing_svc = resource.attributes.service.name IS NULL OR resource.attributes.service.name == ""
      | STATS
          failed = COUNT(*) WHERE missing_svc,
          example = SAMPLE(_id, 1) WHERE missing_svc,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "RES-001"
    enabled: true
    description: "service.instance.id is present"
    impact: "Normal"
    target: "Resource"
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
      | EVAL missing_instance = resource.attributes.service.instance.id IS NULL OR resource.attributes.service.instance.id == ""
      | STATS
          failed = COUNT(*) WHERE missing_instance,
          example = SAMPLE(_id, 1) WHERE missing_instance,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "RES-002"
    enabled: true
    description: "service.instance.id is unique across logical resources"
    impact: "Important"
    target: "Resource"
    notes: >
      Derives a logical-resource key from k8s pod uid/name, host.name,
      container.id, and k8s.node.name. ES|QL fails planning when referenced
      fields are absent, so this conservative native-OTLP mapping avoids
      less consistently indexed fields such as host.id and service.node.name.
      An empty key is treated as "@@UNVERIFIABLE@@" and excluded from
      duplicate detection. A service fails if any of its instance.ids appears
      with multiple distinct logical resources.
    query: |
      FROM {{ .Indices.Traces }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND resource.attributes.service.instance.id IS NOT NULL
          AND resource.attributes.service.instance.id != ""
      | EVAL logical_resource = CONCAT(
            COALESCE(resource.attributes.k8s.pod.uid, ""), "|",
            COALESCE(resource.attributes.k8s.pod.name, ""), "|",
            COALESCE(resource.attributes.host.name, ""), "|",
            COALESCE(resource.attributes.container.id, ""), "|",
            COALESCE(resource.attributes.k8s.node.name, ""))
      | EVAL logical_resource = CASE(logical_resource == "||||", "@@UNVERIFIABLE@@", logical_resource)
      | STATS distinct_resources = COUNT_DISTINCT(logical_resource),
              has_unverifiable = MAX(CASE(logical_resource == "@@UNVERIFIABLE@@", 1, 0))
              BY resource.attributes.service.name, instance_id = resource.attributes.service.instance.id
      | EVAL is_dup = (distinct_resources - has_unverifiable) > 1
      | STATS
          failed = COUNT(*) WHERE is_dup,
          example = SAMPLE(instance_id, 1) WHERE is_dup,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "RES-003"
    enabled: true
    description: "k8s.pod.uid is present in Kubernetes telemetry"
    impact: "Important"
    target: "Resource"
    notes: >
      Precondition: any of k8s.pod.uid, k8s.pod.name, k8s.namespace.name,
      or k8s.node.name is present (i.e. it's a k8s workload). Non-k8s
      services do not contribute violations.
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND COALESCE(
              resource.attributes.k8s.pod.uid,
              resource.attributes.k8s.pod.name,
              resource.attributes.k8s.namespace.name,
              resource.attributes.k8s.node.name) IS NOT NULL
      | EVAL missing_uid = resource.attributes.k8s.pod.uid IS NULL OR resource.attributes.k8s.pod.uid == ""
      | STATS
          failed = COUNT(*) WHERE missing_uid,
          example = SAMPLE(_id, 1) WHERE missing_uid,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "RES-004"
    enabled: true
    description: "Semantic conventions attributes are used at the right level"
    impact: "Important"
    target: "Resource, Log, Span"
    notes: >
      The full semconv attribute registry has ~800 entries; checking every
      key as a column reference would produce an unmanageable query. This
      mapping checks the high-confidence subset that the spec itself uses
      as exemplars: identity attributes (service.*, host.*, k8s.*) must be
      at resource level only, and inherently per-span attributes (http.*,
      db.*, rpc.*, messaging.*) must NOT appear at resource level. False
      negatives are expected for the long tail; widen the lists below as
      operational findings demand. Catalog source:
      internal/semconv/placement.go (`vern semconv sync`).
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
      | EVAL
          resource_only_on_span =
            attributes.service.name IS NOT NULL
            OR attributes.service.namespace IS NOT NULL
            OR attributes.service.instance.id IS NOT NULL
            OR attributes.service.version IS NOT NULL
            OR attributes.host.name IS NOT NULL
            OR attributes.host.id IS NOT NULL
            OR attributes.k8s.pod.uid IS NOT NULL
            OR attributes.k8s.pod.name IS NOT NULL
            OR attributes.k8s.namespace.name IS NOT NULL
            OR attributes.k8s.node.name IS NOT NULL
            OR attributes.container.id IS NOT NULL
            OR attributes.deployment.environment.name IS NOT NULL
            OR attributes.telemetry.sdk.language IS NOT NULL
            OR attributes.telemetry.sdk.version IS NOT NULL,
          span_only_on_resource =
            resource.attributes.http.request.method IS NOT NULL
            OR resource.attributes.http.response.status_code IS NOT NULL
            OR resource.attributes.http.route IS NOT NULL
            OR resource.attributes.db.system.name IS NOT NULL
            OR resource.attributes.db.query.text IS NOT NULL
            OR resource.attributes.db.collection.name IS NOT NULL
            OR resource.attributes.rpc.method IS NOT NULL
            OR resource.attributes.rpc.system IS NOT NULL
            OR resource.attributes.messaging.system IS NOT NULL
            OR resource.attributes.messaging.destination.name IS NOT NULL
            OR resource.attributes.url.path IS NOT NULL
            OR resource.attributes.url.full IS NOT NULL
      | EVAL misplaced = resource_only_on_span OR span_only_on_resource
      | STATS
          failed = COUNT(*) WHERE misplaced,
          example = SAMPLE(_id, 1) WHERE misplaced,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  # ─── Span Rules ───────────────────────────────────────────────

  - spec_rule_id: "SPA-001"
    enabled: true
    description: "Traces contain a limited number of INTERNAL spans per service"
    impact: "Normal"
    target: "TraceSpan"
    notes: >
      Counts INTERNAL spans per (trace_id, service.name); a service fails
      on traces with more than 10 internal spans. Matches both PascalCase
      ("Internal") and OTel SDK form ("SPAN_KIND_INTERNAL").
    query: |
      FROM {{ .Indices.Traces }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND kind IN ("Internal", "SPAN_KIND_INTERNAL")
      | STATS internal_count = COUNT(*) BY trace_id, resource.attributes.service.name
      | EVAL too_many = internal_count > 10
      | STATS
          failed = COUNT(*) WHERE too_many,
          example = SAMPLE(trace_id, 1) WHERE too_many,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "SPA-002"
    enabled: true
    description: "Traces do not contain orphan spans"
    impact: "Normal"
    target: "TraceSpan"
    notes: >
      Groups each trace and service, collects the trace's span_ids and
      parent_span_ids, then checks the parent id set is a subset of the
      span id set. This detects traces where any parent_span_id does not
      exist in the same trace, matching the spec without a self-join.
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
      | EVAL has_parent = parent_span_id IS NOT NULL AND parent_span_id != ""
      | STATS
          span_ids = VALUES(span_id),
          parent_ids = VALUES(parent_span_id) WHERE has_parent,
          parented_spans = COUNT(*) WHERE has_parent,
          example = SAMPLE(_id, 1) WHERE has_parent
            BY trace_id, resource.attributes.service.name
      | WHERE parented_spans > 0
      | EVAL trace_has_orphan = NOT MV_CONTAINS(span_ids, parent_ids)
      | STATS
          failed = COUNT(*) WHERE trace_has_orphan,
          example = SAMPLE(trace_id, 1) WHERE trace_has_orphan,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "SPA-003"
    enabled: true
    status: "heuristic"
    description: "Span names have bound cardinality"
    impact: "Important"
    target: "TraceSpan"
    notes: >
      Spec criteria is TODO; this is the heuristic used in the peek
      reference (useInstrumentationScore.ts): pass if total spans < 50
      (low sample size), or if distinct span names <= 200, or if the
      ratio (distinct / total) <= 0.3. Otherwise fail with extent equal
      to the cardinality ratio.
    query: |
      FROM {{ .Indices.Traces }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND name IS NOT NULL
      | STATS total = COUNT(*),
              distinct_names = COUNT_DISTINCT(name)
            BY resource.attributes.service.name
      | EVAL ratio = CASE(total != 0, distinct_names::double / total::double, 0.0)
      | EVAL rule_passed = total < 50 OR distinct_names <= 200 OR ratio <= 0.3,
          extent = CASE(rule_passed, 0.0, ratio),
          example = CONCAT(TO_STRING(distinct_names), " distinct / ", TO_STRING(total), " spans")
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "SPA-004"
    enabled: true
    description: "Root spans are not CLIENT spans"
    impact: "Important"
    target: "TraceSpan"
    notes: >
      A root document is one with no parent_span_id; a CLIENT root is a
      violation. Matches both "Client" and "SPAN_KIND_CLIENT".
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND (parent_span_id IS NULL OR parent_span_id == "")
      | EVAL is_client_root = kind IN ("Client", "SPAN_KIND_CLIENT")
      | STATS
          failed = COUNT(*) WHERE is_client_root,
          example = SAMPLE(_id, 1) WHERE is_client_root,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "SPA-005"
    enabled: true
    description: "Traces do not contain a high number of short duration spans"
    impact: "Important"
    target: "TraceSpan"
    notes: >
      Conservative implementation of the spec criteria: a trace fails if it
      has more than 20 spans of any kind under 5ms. duration is in nanoseconds;
      5ms = 5e6 ns.
    query: |
      FROM {{ .Indices.Traces }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND duration IS NOT NULL
      | EVAL is_short = duration < 5000000
      | STATS short_count = COUNT(*) WHERE is_short BY trace_id, resource.attributes.service.name
      | EVAL too_many_short = short_count > 20
      | STATS
          failed = COUNT(*) WHERE too_many_short,
          example = SAMPLE(trace_id, 1) WHERE too_many_short,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  # ─── Log Rules ────────────────────────────────────────────────

  - spec_rule_id: "LOG-001"
    enabled: true
    description: "Debug-level logs are not enabled in production for >14 days"
    impact: "Important"
    target: "Log"
    notes: >
      Looks back 14 days. A service is in production if its
      resource.attributes.deployment.environment.name starts with "prod"
      (case-insensitive).
    query: |
      FROM {{ .Indices.Logs }} METADATA _id
      | WHERE @timestamp > NOW() - 14d{{ .ScopeFilter }}
      | EVAL is_prod = STARTS_WITH(TO_LOWER(COALESCE(resource.attributes.deployment.environment.name, "")), "prod"),
          is_debug = TO_UPPER(COALESCE(severity_text, "")) == "DEBUG"
      | EVAL violation = is_prod AND is_debug
      | STATS
          failed = COUNT(*) WHERE violation,
          example = SAMPLE(_id, 1) WHERE violation,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "LOG-002"
    enabled: true
    description: "Log records have severityNumber set"
    impact: "Important"
    target: "Log"
    query: |
      FROM {{ .Indices.Logs }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
      | EVAL no_sev = severity_text IS NULL
          OR severity_text == ""
          OR TO_UPPER(severity_text) == "UNSET"
          OR severity_number IS NULL
          OR severity_number == 0
      | STATS
          logs_wo_severity = COUNT(*) WHERE no_sev,
          example = SAMPLE(_id, 1) WHERE no_sev,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (logs_wo_severity == 0),
          extent = CASE(total != 0, logs_wo_severity::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  # ─── Metric Rules ─────────────────────────────────────────────
  #
  # Schema assumptions for OTel-native metrics in Elastic Serverless (mapping
  # mode: otel):
  #   - `TS <metrics-index>` plus `TS_INFO` returns one row per unique time
  #     series, with columns including `metric_name`, `unit`, and the metric's
  #     dimension fields flattened (so resource.attributes.service.name is
  #     queryable when service.name is part of the metric's dimension set —
  #     which is the case for native OTel ingest).
  #   - `attributes.<key>` carries per-data-point attributes on metric docs.
  #   - The unit field follows UCUM; empty unit or "1" is treated as
  #     dimensionless / no useful unit.
  # If your ingest uses a different mapping mode, edit the field paths below.
  # MET-004 (histogram bucket consistency) stays disabled because histogram
  # bucket boundaries are not exposed via TS_INFO / METRICS_INFO as of 9.4.

  - spec_rule_id: "MET-001"
    enabled: true
    description: "Metric attributes have bound cardinality"
    impact: "Important"
    target: "Metric"
    notes: >
      Spec requires cardinality per metric name and attribute key within a
      1-hour window. ES|QL cannot dynamically iterate every discovered
      attribute, so Vern checks a curated allowlist of high-cardinality-risk
      semconv attribute keys (see internal/semconv/met001_allowlist.go).
      A (metric_name, service) pair is flagged when ANY of the allowlisted
      attributes exceeds the configured cardinality_threshold within the
      past hour. Each COUNT_DISTINCT operates on its own attribute column,
      so per-attribute cardinality is preserved (no COALESCE conflation).
    query: |
      TS {{ .Indices.Metrics }}
      | WHERE @timestamp > NOW() - 1h{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
      | STATS
          {{- range $i, $k := .MET001AttrKeys }}
          card_{{ $i }} = COUNT_DISTINCT(attributes.{{ $k }}),
          {{- end }}
          total_rows = COUNT(*)
            BY metric_name, resource.attributes.service.name
      | EVAL over_threshold =
          {{- range $i, $k := .MET001AttrKeys }}
          {{- if $i }} OR {{ end }} card_{{ $i }} > {{ $.CardinalityThreshold }}
          {{- end }}
      | STATS
          failed = COUNT(*) WHERE over_threshold,
          example = SAMPLE(metric_name, 1) WHERE over_threshold,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "MET-002"
    enabled: true
    description: "Metrics have useful metric units"
    impact: "Important"
    target: "Metric"
    notes: >
      Flags metrics whose declared unit is NULL, empty, or "1" (dimensionless).
      The spec calls "1" out as a default-non-useful unit. This is enforced
      per (metric_name, service.name) pair so the score is service-attributable.
    query: |
      TS {{ .Indices.Metrics }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
      | TS_INFO
      | EVAL missing_unit = unit IS NULL OR unit == "" OR unit == "1"
      | STATS
          failed = COUNT(*) WHERE missing_unit,
          example = SAMPLE(metric_name, 1) WHERE missing_unit,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "MET-003"
    enabled: true
    description: "Metric names are consistently associated with the same metric unit"
    impact: "Important"
    target: "Metric"
    notes: >
      Per (metric_name, service.name) over the past 14 days, the spec window:
      every time series sharing a metric_name MUST have the same unit. A
      service fails when any of its metrics emits multiple units for the
      same metric_name.
    query: |
      TS {{ .Indices.Metrics }}
      | WHERE @timestamp > NOW() - 14d{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
      | TS_INFO
      | STATS unit_count = COUNT_DISTINCT(unit)
            BY metric_name, resource.attributes.service.name
      | EVAL inconsistent = unit_count > 1
      | STATS
          failed = COUNT(*) WHERE inconsistent,
          example = SAMPLE(metric_name, 1) WHERE inconsistent,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "MET-004"
    enabled: false
    status: "blocked: histogram bucket boundaries are not surfaced by TS_INFO/METRICS_INFO in 9.4"
    description: "Histogram metrics consistently use the same histogram buckets per metric name"
    impact: "Normal"
    target: "Metric"
    notes: >
      Bucket boundary metadata is not exposed by any ES|QL command in the
      9.4 timeframe, including PROMQL preview. Revisit when histogram
      bucket lists become introspectable (or when Vern adds an OTLP-direct
      ingestion path).
    query: |
      ROW rule_passed = false,
          `service.name` = "_coverage_blocked",
          example = "MET-004 blocked: histogram bucket metadata unavailable to generic ES|QL mapping",
          extent = 1.0
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "MET-005"
    enabled: true
    description: "Metric names do not contain the name of the metric unit"
    impact: "Normal"
    target: "Metric"
    notes: >
      Common violations: metrics named `*.seconds`, `*.bytes`, `*.percent`
      when the unit is `s`, `By`, `%`. The check is case-insensitive on the
      metric name and uses a fixed regex set so we don't depend on the unit
      field for the match (only for the name pattern).
    query: |
      TS {{ .Indices.Metrics }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
      | TS_INFO
      | EVAL lower_name = TO_LOWER(metric_name),
          contains_unit_word = RLIKE(lower_name,
            ".*(\\.|_)(seconds?|milliseconds?|microseconds?|nanoseconds?|bytes?|kilobytes?|megabytes?|gigabytes?|percent(age)?)$")
      | STATS
          failed = COUNT(*) WHERE contains_unit_word,
          example = SAMPLE(metric_name, 1) WHERE contains_unit_word,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  - spec_rule_id: "MET-006"
    enabled: true
    description: "Metric names do not equal semantic convention attribute keys"
    impact: "Important"
    target: "Metric"
    notes: >
      Vern's vendored semantic-convention catalog (internal/semconv,
      regenerated via `vern semconv sync`) defines the canonical attribute
      key set; a metric whose name exactly equals one of those keys is a
      violation per the spec.
    query: |
      TS {{ .Indices.Metrics }}
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
      | TS_INFO
      | EVAL is_semconv_key = metric_name IN ({{ .SemconvAttributeKeys }})
      | STATS
          failed = COUNT(*) WHERE is_semconv_key,
          example = SAMPLE(metric_name, 1) WHERE is_semconv_key,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  # ─── SDK Rules ────────────────────────────────────────────────

  - spec_rule_id: "SDK-001"
    enabled: false
    opt_in_flag: "filters.enable_sdk_rules"
    status: "opt-in: enable via filters.enable_sdk_rules in vern.yaml (vendored support matrix drifts)"
    description: "Dependencies (language and runtime) are supported by the SDK"
    impact: "Low"
    target: "SDK"
    notes: >
      Opt-in (filters.enable_sdk_rules: true). Compares observed
      telemetry.sdk.language and telemetry.sdk.version resource attributes
      against the vendored matrix in internal/sdksupport/matrix.go. Unknown
      languages are treated as supported (false positives are worse than
      gaps here). Services without telemetry.sdk.language do not contribute
      to the rule.
    query: |
      FROM {{ .Indices.Traces }} METADATA _id
      | WHERE @timestamp > NOW() - {{ .TimeWindow }}{{ .ScopeFilter }}
          AND resource.attributes.service.name IS NOT NULL
          AND resource.attributes.telemetry.sdk.language IS NOT NULL
      | EVAL is_supported = {{ .SDKSupportMatrix }}
      | EVAL is_unsupported = NOT is_supported
      | STATS
          failed = COUNT(*) WHERE is_unsupported,
          example = SAMPLE(_id, 1) WHERE is_unsupported,
          total = COUNT(*)
            BY resource.attributes.service.name
      | EVAL rule_passed = (failed == 0),
          extent = CASE(total != 0, failed::double / total::double, 0.0)
      | RENAME resource.attributes.service.name AS service.name
      | KEEP rule_passed, service.name, example, extent

  # ─── Score Aggregation (final step in workflow) ───────────────

  - spec_rule_id: "_SCORE_AGGREGATION"
    enabled: true
    is_aggregation: true
    description: "Calculate the final instrumentation score per service"
    notes: >
      Aggregates per-service rule results written by store_* steps over
      the configured score lookback (excluding bootstrap and coverage rows). Score
      formula matches the spec:
      Σ(P_i * W_i) / Σ(T_i * W_i) * 100, weights
      Critical=40, Important=30, Normal=20, Low=10.
    query: |
      FROM {{ .ResultIndex }}
      | WHERE evaluated_at > NOW() - {{ .ScoreLookback }}
          AND NOT (rule_id IN ("_BOOTSTRAP", "_TOTAL", "_COVERAGE"))
          AND service.name != "_schema_init"
      | STATS
          critical_passed = SUM(CASE(impact == "Critical" AND rule_passed == true, 1, 0)),
          critical_total = SUM(CASE(impact == "Critical", 1, 0)),
          important_passed = SUM(CASE(impact == "Important" AND rule_passed == true, 1, 0)),
          important_total = SUM(CASE(impact == "Important", 1, 0)),
          normal_passed = SUM(CASE(impact == "Normal" AND rule_passed == true, 1, 0)),
          normal_total = SUM(CASE(impact == "Normal", 1, 0)),
          low_passed = SUM(CASE(impact == "Low" AND rule_passed == true, 1, 0)),
          low_total = SUM(CASE(impact == "Low", 1, 0))
            BY service.name
      | EVAL
          numerator = (critical_passed * 40) + (important_passed * 30) + (normal_passed * 20) + (low_passed * 10),
          denominator = (critical_total * 40) + (important_total * 30) + (normal_total * 20) + (low_total * 10),
          score = CASE(denominator != 0, (numerator::double / denominator::double) * 100, 0.0),
          category = CASE(
            score >= 90, "Excellent",
            score >= 75, "Good",
            score >= 50, "Needs Improvement",
            "Poor"
          )
      | KEEP service.name, score, category,
          critical_passed, critical_total,
          important_passed, important_total,
          normal_passed, normal_total,
          low_passed, low_total
