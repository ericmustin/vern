<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1100" font-family="'Virgil', 'Comic Sans MS', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="60" y="60" font-size="32" font-weight="700" fill="#1e1e1e">Vern</text>
  <text x="60" y="92" font-size="17" fill="#495057">deploy once → workflow evaluates rules → agent answers governance questions</text>

  <!-- =========================== -->
  <!-- STEP 1: DEPLOY              -->
  <!-- =========================== -->
  <circle cx="40" cy="200" r="22" fill="#1971c2"/>
  <text x="40" y="208" font-size="22" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="40" y="248" font-size="13" fill="#495057" text-anchor="middle">deploy</text>

  <!-- Inputs -->
  <rect x="100" y="140" width="240" height="140" rx="12" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
  <text x="220" y="180" font-size="16" fill="#1e1e1e" text-anchor="middle" font-weight="700">Inputs</text>
  <text x="220" y="215" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">spec/rules/*.md</text>
  <text x="220" y="237" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">esql-mappings.yaml</text>
  <text x="220" y="259" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">vern.yaml</text>

  <line x1="340" y1="210" x2="412" y2="210" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- vern setup -->
  <rect x="420" y="170" width="180" height="80" rx="12" fill="#1e1e1e"/>
  <text x="510" y="218" font-size="22" fill="#fff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">vern setup</text>

  <line x1="600" y1="210" x2="672" y2="210" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Deployed group -->
  <rect x="680" y="140" width="700" height="140" rx="12" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
  <text x="1030" y="170" font-size="16" fill="#1e1e1e" text-anchor="middle" font-weight="700">Deployed to Elastic</text>

  <rect x="700" y="190" width="210" height="70" rx="8" fill="#ffffff" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="805" y="218" font-size="14" fill="#1e1e1e" text-anchor="middle" font-weight="700">Workflow</text>
  <text x="805" y="240" font-size="12" fill="#495057" text-anchor="middle">runs ES|QL rule queries</text>

  <rect x="920" y="190" width="210" height="70" rx="8" fill="#ffffff" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="1025" y="218" font-size="14" fill="#1e1e1e" text-anchor="middle" font-weight="700">Dashboards</text>
  <text x="1025" y="240" font-size="12" fill="#495057" text-anchor="middle">overview + drill-down</text>

  <rect x="1140" y="190" width="220" height="70" rx="8" fill="#ffffff" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="1250" y="218" font-size="14" fill="#1e1e1e" text-anchor="middle" font-weight="700">Agent + skill</text>
  <text x="1250" y="240" font-size="12" fill="#495057" text-anchor="middle">governance Q&amp;A</text>

  <!-- Workflow -> Evaluate -->
  <line x1="805" y1="260" x2="805" y2="346" stroke="#495057" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dim)"/>
  <text x="820" y="310" font-size="13" fill="#495057" font-style="italic">runs hourly</text>

  <!-- =========================== -->
  <!-- STEP 2: EVALUATE            -->
  <!-- =========================== -->
  <circle cx="40" cy="470" r="22" fill="#862e9c"/>
  <text x="40" y="478" font-size="22" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="40" y="518" font-size="13" fill="#495057" text-anchor="middle">evaluate</text>

  <rect x="100" y="360" width="1280" height="260" rx="12" fill="#f8f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="740" y="392" font-size="16" fill="#862e9c" text-anchor="middle" font-weight="700">Per-service rule evaluation</text>

  <!-- Table headers -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="14" font-weight="700" fill="#495057">
    <text x="160" y="430">service.name</text>
    <text x="450" y="430" text-anchor="middle">RES-005</text>
    <text x="590" y="430" text-anchor="middle">LOG-002</text>
    <text x="730" y="430" text-anchor="middle">MET-001</text>
    <text x="870" y="430" text-anchor="middle">SPA-004</text>
    <text x="1010" y="430" text-anchor="middle">…</text>
    <text x="1250" y="430" text-anchor="middle" fill="#1e1e1e">score</text>
  </g>
  <line x1="120" y1="442" x2="1360" y2="442" stroke="#862e9c" stroke-width="1"/>

  <!-- Sub-headers describing rules briefly -->
  <g font-size="10" fill="#868e96" font-family="system-ui,sans-serif" font-style="italic">
    <text x="450" y="458" text-anchor="middle">service.name set</text>
    <text x="590" y="458" text-anchor="middle">severity set</text>
    <text x="730" y="458" text-anchor="middle">cardinality ok</text>
    <text x="870" y="458" text-anchor="middle">root != CLIENT</text>
  </g>

  <!-- Row 1: checkout-svc -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="16">
    <text x="160" y="498" fill="#1e1e1e">checkout-svc</text>
    <text x="450" y="498" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="590" y="498" text-anchor="middle" fill="#e03131" font-weight="700">✗</text>
    <text x="730" y="498" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="870" y="498" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="1010" y="498" text-anchor="middle" fill="#868e96">…</text>
  </g>
  <rect x="1200" y="479" width="100" height="28" rx="6" fill="#ffec99" stroke="#e8590c" stroke-width="1.5"/>
  <text x="1250" y="499" text-anchor="middle" font-weight="700" font-size="16" fill="#1e1e1e" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">78</text>

  <!-- Row 2: payments-svc -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="16">
    <text x="160" y="538" fill="#1e1e1e">payments-svc</text>
    <text x="450" y="538" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="590" y="538" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="730" y="538" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="870" y="538" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="1010" y="538" text-anchor="middle" fill="#868e96">…</text>
  </g>
  <rect x="1200" y="519" width="100" height="28" rx="6" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="1250" y="539" text-anchor="middle" font-weight="700" font-size="16" fill="#1e1e1e" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">95</text>

  <!-- Row 3: cart-svc -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="16">
    <text x="160" y="578" fill="#1e1e1e">cart-svc</text>
    <text x="450" y="578" text-anchor="middle" fill="#e03131" font-weight="700">✗</text>
    <text x="590" y="578" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="730" y="578" text-anchor="middle" fill="#e03131" font-weight="700">✗</text>
    <text x="870" y="578" text-anchor="middle" fill="#2f9e44" font-weight="700">✓</text>
    <text x="1010" y="578" text-anchor="middle" fill="#868e96">…</text>
  </g>
  <rect x="1200" y="559" width="100" height="28" rx="6" fill="#ffc9c9" stroke="#e03131" stroke-width="1.5"/>
  <text x="1250" y="579" text-anchor="middle" font-weight="700" font-size="16" fill="#1e1e1e" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">62</text>

  <!-- Score formula footnote -->
  <text x="160" y="605" font-size="12" fill="#495057" font-style="italic">score = Σ(P × W) / Σ(T × W) × 100   ·   weights: Critical=40, Important=30, Normal=20, Low=10</text>

  <!-- Evaluate -> Store -->
  <line x1="740" y1="620" x2="740" y2="676" stroke="#495057" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dim)"/>
  <text x="755" y="655" font-size="13" fill="#495057" font-style="italic">writes</text>

  <!-- =========================== -->
  <!-- STEP 3: STORE               -->
  <!-- =========================== -->
  <circle cx="40" cy="755" r="22" fill="#862e9c"/>
  <text x="40" y="763" font-size="22" fill="#fff" text-anchor="middle" font-weight="700">3</text>
  <text x="40" y="803" font-size="13" fill="#495057" text-anchor="middle">store</text>

  <!-- Cylinder: centered around x=740, body y=695..795 -->
  <g>
    <path d="M 540,695 L 540,795 A 200,15 0 0 0 940,795 L 940,695 A 200,15 0 0 1 540,695 Z"
          fill="#d0bfff" stroke="#862e9c" stroke-width="2"/>
    <ellipse cx="740" cy="695" rx="200" ry="15" fill="#d0bfff" stroke="#862e9c" stroke-width="2"/>
  </g>
  <text x="740" y="735" font-size="18" fill="#1e1e1e" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-weight="700">instrumentation-score-results</text>
  <text x="740" y="762" font-size="13" fill="#495057" text-anchor="middle" font-style="italic">{ service.name, rule_id, rule_passed, extent, example, score }</text>

  <!-- Store -> Agent (query, curved up-arrow from cylinder right side to agent box) -->
  <path d="M 940,750 C 1080,750 1180,790 1180,860"
        fill="none" stroke="#495057" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1180" y1="860" x2="1180" y2="876" stroke="#495057" stroke-width="2" marker-end="url(#arrow-dim)"/>
  <text x="1100" y="800" font-size="13" fill="#495057" font-style="italic">queries</text>

  <!-- =========================== -->
  <!-- STEP 4: ANSWER              -->
  <!-- =========================== -->
  <circle cx="40" cy="970" r="22" fill="#e8590c"/>
  <text x="40" y="978" font-size="22" fill="#fff" text-anchor="middle" font-weight="700">4</text>
  <text x="40" y="1018" font-size="13" fill="#495057" text-anchor="middle">answer</text>

  <rect x="100" y="880" width="1280" height="180" rx="12" fill="#fff4e6" stroke="#e8590c" stroke-width="2"/>
  <text x="740" y="912" font-size="16" fill="#e8590c" text-anchor="middle" font-weight="700">Agent + governance skill</text>

  <!-- Dialog row 1 -->
  <rect x="140" y="930" width="560" height="48" rx="10" fill="#ffffff" stroke="#ced4da" stroke-width="1.5"/>
  <text x="160" y="960" font-size="14" fill="#1e1e1e">user: which service has the worst score?</text>

  <rect x="780" y="930" width="560" height="48" rx="10" fill="#1e1e1e"/>
  <text x="800" y="960" font-size="14" fill="#ffffff" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">cart-svc (62) — failing RES-005, MET-001</text>

  <!-- Dialog row 2 -->
  <rect x="140" y="992" width="560" height="48" rx="10" fill="#ffffff" stroke="#ced4da" stroke-width="1.5"/>
  <text x="160" y="1022" font-size="14" fill="#1e1e1e">user: why is checkout-svc failing LOG-002?</text>

  <rect x="780" y="992" width="560" height="48" rx="10" fill="#1e1e1e"/>
  <text x="800" y="1022" font-size="14" fill="#ffffff" font-family="'JetBrains Mono','SF Mono',Menlo,monospace">debug logs enabled in prod &gt; 14d</text>
</svg>
