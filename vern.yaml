# vern.yaml — Default configuration for Vern CLI
# This file is loaded by default from the current directory.
# Override with --config flag.

# Which backend to target for query generation
backend: esql

# Path to vendored upstream spec rule markdown files
rules_dir: ./spec/rules

# Path to backend-specific query mappings
mappings: ./configs/esql-mappings.yaml

# Output format for workflow generation
format: elastic

# Backend-specific configuration
esql:
  # Lookback window for rule evaluation queries.
  # 1h is the spec's typical window for live monitoring; bump to a longer
  # window (e.g. 7d, 30d) when demoing against stale data.
  time_window: "30d"

  # Lookback window used by the final score aggregation over Vern's result index.
  # Keep this longer than the workflow's expected runtime and schedule interval.
  score_lookback: "2h"

  # Elasticsearch index patterns for OTel data.
  # Defaults match Elastic Serverless OTLP ingestion (data streams created
  # automatically when sending via the project's OTLP endpoint). If you ingest
  # via the legacy APM agent, use "traces-apm*" instead.
  index_patterns:
    traces: "traces-*.otel-*"
    metrics: "metrics-*.otel-*"
    logs: "logs-*.otel-*"

  # Where to store rule evaluation results
  result_index: "instrumentation-score-results"

  # Where to write APM annotation documents
  annotations_index: "observability-annotations"

  # Schedule interval for the generated workflow (default: hourly)
  # Uses Elastic Workflows interval format: "5m", "15m", "30m", "1h", "6h", "12h", "1d"
  schedule: "1h"

  # Cardinality threshold for MET-001 rule
  cardinality_threshold: 10000

# Elastic connection (used by `vern sync`)
# The sync target is the KIBANA URL, not the Elasticsearch URL.
# Can also be set via environment variables:
#   VERN_API_KEY, VERN_KIBANA_URL
elastic:
  # kibana_url: "https://<your-project>.kb.elastic.cloud"
  # api_key: ""  # Prefer VERN_API_KEY env var

# Services to exclude from evaluation
# Useful for ignoring internal/system services
exclusions:
  services: []
  # - "otel-collector"
  # - "elastic-agent"
  service_patterns: []
  # - "^test-.*"
  # - "^debug-.*"
